name: Scrape ATM Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write   # 🔥 IMPORTANT FIX

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4   # 🔥 upgrade

      - name: Setup Node
        uses: actions/setup-node@v4   # 🔥 upgrade
        with:
          node-version: "18"

      - name: Install deps
        run: npm install

      - name: Run scraper
        run: node scraper.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "update atm data" || echo "no changes"
          git push
