name: ATM Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # ✅ ADD HERE

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install

      - run: node scraper.js

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add atms.json bna.json processed_sitemaps.json seen_urls.json
          git commit -m "update atm data" || echo "no changes"
          git push
